<html>
	<head>
		<title>Contact Us</title>

	<body>
		<div class="navigation-menu">
			<ul>
				<li><a href="index.html">Home</a></li>

			</ul>

		<div class="container">
			<div class="item">
				<h1>CONTACT US</h1>
				<p>Please leave us a message we will reach out to you as soon as possible</p>
			</div>
			<form class="form-group" action="contact.html" method="post">
				<label for="name">Name</label>
				<input type="text" class="form-item" value name="name" id="name" placeholder="Please enter your name" required autocomplete="off" autofocus>
				<label for="email">Email</label>
				<input type="email" class="form-item" value name="email"id="email" placeholder="email@example.com" required autocomplete="off" autofocus>
				<label for="comment">Comment</label>
				<input type="textarea" class="form-item" value name="comment" id="comment" placeholder="Type your message here" required autocomplete="off">
				<input type="Submit" id="submit">
			</form>
		</div>
	</body>
	<footer>
		<p style="color: black">Connect with us on social: X, Facebook, Instagram, Snapchat</p>
	</footer>
</html>
