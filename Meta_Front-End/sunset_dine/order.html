<!DOCTYPE html>
<html>
	<head>
		<title>Sunset Dine</title>
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<div class="navigation-menu">
			<ul>
				<li><a href="index.html">Home</a></li>
				<li><a href="order.html">Place an order</a></li>
				<li><a href="news.html">News</a></li>
				<li><a href="location.html">About us</a></li>
				<li><a href="contact.html">Contact us</a></li>
			</ul>
		</div>

		<div class="container">
			<div class="item">
				<h1>PLACE AN ORDER</h1>
			</div>
			<div class="item">
				<form action="order.html" method="post">
					<input type="text" placeholder="Input your name">
					<input type="text" placeholder="Input your location">
					<p>Select your main dish</p>
					<select name="Select Dish" id="main dish">
						<option value="choose">Main Dish</option>
						<option value="omutuo">Omutuo</option>
						<option value="fufu">Fufu</option>
						<option>Banku</option>
					</select>
					<input type="number" placeholder="Number">
					<p>Select soup</p>
					<select name="soups" id="">
						<option value="choose">Soups Available</option>
						<option value="palmnut">Palmnut Soup</option>
						<option value="groundnut">Groundnut Soup</option>
						<option value="light">Light Soup</option>
					</select>
					<input type="submit">
				</form>
			</div>
			<div class="item">
				<a class="navigation" href="location.html">Our Location</a>
				<table>
					<tr>
						<th>Dish</th>
						<th>Price</th>
						<th>Discount</th>
					</tr>
					<tr>
						<td>Omutuo</td>
						<td>&#8373 25</td>
						<td>5% on Saturdays</td>
					</tr>
					<tr>
						<td>Fufu</td>
						<td>&#8373 30</td>
						<td>5% on Sundays</td>
					</tr>
				</table>
			</div>

		</div>
	</body>
</html>
