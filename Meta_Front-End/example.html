<!DOCTYPE html>
<html>
    <head>
        <title>My Website</title>
        <link rel="stylesheet" href="bootstrap.min.css">
    </head>
    <body>
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <div class="text-center">
                        <img src="" class="img-fluid" alt="">
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-3">
                    <div class="text-start">
                        <div class="alert alert-info">New Dish Available</div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-12">
                    <div class="text-center">
                        <h1>Our Menu</h1>
                        <div class="row">
                            <div class="col-12 col-lg-6">
                                <div class="card">
                                    <img src="" class="card-img-top" alt="">
                                    <div class="card-body">
                                        <h2 class="card-header">Falafel</h2>
                                        <p class="card-text">chickpea, herbs, spices</p>
                                    </div>
                                </div>
                            </div>
                            <div class="col-12 col-lg-6">
                                <div class="card">
                                    <img src="" class="card-img-top" alt="">
                                    <div class="card-body bg-success">
                                        <h2 class="card-header">Fried Calamari <span class="badge bg-primary"> New</span></h2>
                                        <p class="card-text">Squid, buttermilk</p>
                                    </div>
                                </div>
                            </div>
                            <div class="col-12 col-lg-6">
                                <div class="card">
                                    <img src="" class="card-img-top" alt="">
                                    <div class="card-body">
                                        <h2>Pasta Salad</h2>
                                        <p>Lettuce, vegetables, mozzarella</p>
                                    </div>
                                </div>
                            </div>
                            <div class="col-12 col-lg-6">
                                <div class="card">
                                    <img src="" class="card-img-top" alt="">
                                    <div class="card-body">
                                        <h2>Greek Salad</h2>
                                        <p>Cucumbers, onion, feta cheese</p>
                                    </div>
                                </div>
                                <div class="alert alert-info" role="alert">Try Our New Dish</div>
                                <div class="input-group">
                                    <span class="input-group-text">$</span>
                                    <input class="form-control" type="text" width="50px">
                                    <span class="input-group-text">.00</span>
                                </div>
                                <div class="form-floating">
                                    <input type="email" class="form-control" id="addressInput" placeholder="Address">
                                    <label for="addressInput">Address</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
